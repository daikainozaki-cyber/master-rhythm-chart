<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  <!-- 4x4 grid lines -->
  <line x1="8" y1="4" x2="8" y2="28" stroke="#334" stroke-width="0.5"/>
  <line x1="16" y1="4" x2="16" y2="28" stroke="#334" stroke-width="0.5"/>
  <line x1="24" y1="4" x2="24" y2="28" stroke="#334" stroke-width="0.5"/>
  <line x1="4" y1="10" x2="28" y2="10" stroke="#334" stroke-width="0.5"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#334" stroke-width="0.5"/>
  <line x1="4" y1="22" x2="28" y2="22" stroke="#334" stroke-width="0.5"/>
  <!-- Chord cells highlighted -->
  <rect x="4" y="4" width="4" height="6" rx="1" fill="#60a5fa" opacity="0.9"/>
  <rect x="8" y="4" width="8" height="6" rx="1" fill="#60a5fa" opacity="0.5"/>
  <rect x="20" y="10" width="8" height="6" rx="1" fill="#4ade80" opacity="0.7"/>
  <rect x="4" y="16" width="12" height="6" rx="1" fill="#60a5fa" opacity="0.6"/>
  <rect x="16" y="22" width="8" height="6" rx="1" fill="#fbbf24" opacity="0.7"/>
  <!-- Bar lines -->
  <line x1="4" y1="4" x2="4" y2="28" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
  <line x1="28" y1="4" x2="28" y2="28" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
</svg>
